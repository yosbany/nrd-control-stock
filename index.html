<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Control de existencias por producto">
  <title>NRD Control de Stock</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css?v=1781980709252">
  <meta name="theme-color" content="#dc2626">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script>
    (function() {
      var RELOAD_KEY = 'nrd-version-reload-ts';
      var RELOAD_COOLDOWN_MS = 15000;
      var lastReload = parseInt(sessionStorage.getItem(RELOAD_KEY) || '0', 10);
      if (Date.now() - lastReload < RELOAD_COOLDOWN_MS) return;
      var link = document.querySelector('link[rel="stylesheet"][href*=".css"]');
      var match = link && link.href && link.href.match(/[?&]v=(\d+)/);
      var localVersion = match ? String(match[1]) : null;
      if (!localVersion) return;
      fetch('version.json?t=' + Date.now(), { cache: 'no-store' })
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
          var serverVersion = data && data.v != null ? String(data.v) : null;
          if (!serverVersion || serverVersion === localVersion) return;
          sessionStorage.setItem(RELOAD_KEY, String(Date.now()));
          var sw = ('serviceWorker' in navigator)
            ? navigator.serviceWorker.getRegistrations().then(function(regs) { regs.forEach(function(r) { r.unregister(); }); })
            : Promise.resolve();
          var cacheClear = ('caches' in window)
            ? caches.keys().then(function(names) { names.forEach(function(n) { caches.delete(n); }); })
            : Promise.resolve();
          Promise.all([sw, cacheClear]).finally(function() { window.location.reload(); });
        })
        .catch(function() {});
    })();
  </script>
</head>
<body class="bg-white text-black font-sans antialiased">
  <!-- Spinner de procesamiento: inyectado por NRDCommon -->

  <!-- Auth redirect: spinner unificado via NRDCommon -->
  <div id="redirecting-screen" class="hidden" aria-hidden="true"></div>

  <div id="login-screen" class="min-h-screen flex items-center justify-center p-4 sm:p-6 hidden">
    <div class="w-full max-w-sm">
      <h1 class="text-xl sm:text-2xl font-light text-center mb-6 sm:mb-8 tracking-tight">NRD Control de Stock</h1>
      <form id="login-form" class="space-y-3 sm:space-y-4">
        <input type="email" id="login-email" placeholder="Email" required autocomplete="username"
          class="w-full px-0 py-2.5 sm:py-3 border-0 border-b border-gray-300 focus:outline-none focus:border-red-600 bg-transparent text-sm sm:text-base">
        <input type="password" id="login-password" placeholder="Contraseña" required autocomplete="current-password"
          class="w-full px-0 py-2.5 sm:py-3 border-0 border-b border-gray-300 focus:outline-none focus:border-red-600 bg-transparent text-sm sm:text-base">
        <button type="submit" 
          class="w-full mt-4 sm:mt-6 py-2.5 sm:py-3 bg-red-600 text-white border border-red-600 hover:bg-red-700 transition-colors uppercase tracking-wider text-xs sm:text-sm font-light">
          Iniciar Sesión
        </button>
      </form>
      <div id="login-error" class="mt-3 sm:mt-4 text-center text-xs sm:text-sm text-gray-600"></div>
    </div>
  </div>

  <div id="app-screen" class="min-h-screen flex flex-col hidden">
    <div id="app-header-container" data-app-name="NRD Control de Stock" data-icon-path="icon-192.png"></div>
    <nav id="app-nav-container" class="bg-white border-b border-gray-200 flex overflow-x-auto"></nav>
    <main class="flex-1 p-3 sm:p-4 md:p-6 overflow-y-auto max-w-6xl mx-auto w-full">
      <div id="inventory-view" class="view"></div>
    </main>
  </div>

  <div id="profile-modal" class="fixed inset-0 bg-black/50 z-[99999] hidden flex items-center justify-center p-4" style="z-index: 2147483647 !important;">
    <div class="bg-white max-w-2xl w-full border border-gray-200 shadow-lg">
      <div class="p-4 sm:p-6 border-b border-gray-200 flex items-center justify-between">
        <h3 class="text-lg sm:text-xl font-light tracking-tight">Perfil de Usuario</h3>
        <button id="close-profile-modal" class="text-gray-400 hover:text-red-600 text-xl font-light">×</button>
      </div>
      <div id="profile-modal-content" class="p-4 sm:p-6 space-y-4"></div>
      <div class="p-4 sm:p-6 border-t border-gray-200 space-y-2">
        <a id="portal-link" href="/nrd-portal/" 
          class="block w-full px-4 sm:px-6 py-2 bg-blue-600 text-white border border-blue-600 hover:bg-blue-700 transition-colors uppercase tracking-wider text-xs sm:text-sm font-light text-center">
          Ir al Portal
        </a>
        <button id="profile-logout-btn" 
          class="w-full px-4 sm:px-6 py-2 bg-red-600 text-white border border-red-600 hover:bg-red-700 transition-colors uppercase tracking-wider text-xs sm:text-sm font-light">
          Cerrar Sesión
        </button>
      </div>
    </div>
  </div>

  <div id="custom-modal" class="fixed inset-0 bg-black/50 z-[99999] hidden flex items-center justify-center p-2 sm:p-4" style="z-index: 2147483647 !important;">
    <div class="bg-white max-w-6xl w-full border-2 border-gray-200 shadow-2xl max-h-[95vh] overflow-y-auto">
      <div class="p-5 sm:p-6">
        <h3 id="modal-title" class="text-xl sm:text-2xl font-semibold mb-4 sm:mb-6 text-black"></h3>
        <p id="modal-message" class="text-base sm:text-lg text-gray-600 mb-6 sm:mb-8"></p>
        <div class="flex flex-col sm:flex-row gap-3 sm:gap-4">
          <button id="modal-confirm" class="flex-1 px-6 py-4 bg-red-600 text-white border-2 border-red-600 hover:bg-red-700 transition-colors uppercase tracking-wider text-base sm:text-lg font-semibold min-h-[56px]">Confirmar</button>
          <button id="modal-cancel" class="flex-1 px-6 py-4 border-2 border-gray-300 hover:border-red-600 hover:text-red-600 transition-colors uppercase tracking-wider text-base sm:text-lg font-semibold min-h-[56px]">Cancelar</button>
        </div>
      </div>
    </div>
  </div>

  <div id="custom-alert" class="fixed inset-0 bg-black/50 z-[99999] hidden flex items-center justify-center p-4" style="z-index: 2147483647 !important;">
    <div class="bg-white max-w-2xl w-full border border-gray-200 shadow-lg">
      <div class="p-4 sm:p-6">
        <h3 id="alert-title" class="text-lg sm:text-xl font-light mb-3 sm:mb-4 text-black"></h3>
        <p id="alert-message" class="text-sm sm:text-base text-gray-600 mb-4 sm:mb-6"></p>
        <div class="flex justify-end">
          <button id="alert-ok" class="px-4 sm:px-6 py-2 bg-red-600 text-white border border-red-600 hover:bg-red-700 transition-colors uppercase tracking-wider text-xs sm:text-sm font-light">Aceptar</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === '0.0.0.0';
      const nrdDataAccessSrc = isLocalhost
        ? '/nrd-data-access/dist/nrd-data-access.js'
        // Librería NRD Data Access (datos.nrdonline.site)
        : 'https://cdn.jsdelivr.net/gh/yosbany/nrd-data-access@main/dist/nrd-data-access.js';
      const script1 = document.createElement('script');
      script1.src = nrdDataAccessSrc;
      document.head.appendChild(script1);
    })();
  </script>
  <script>
    (function() {
      const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === '0.0.0.0';
      const nrdCommonSrc = isLocalhost
        ? '/nrd-common/dist/nrd-common.js'
        : 'https://cdn.jsdelivr.net/gh/yosbany/nrd-common@main/dist/nrd-common.js';
      const script2 = document.createElement('script');
      script2.src = nrdCommonSrc;
      document.head.appendChild(script2);
    })();
  </script>
  <!-- NRD Common Library Initialization -->
  <script>
    (function(cfg) {
      var start = Date.now();
      var timer = setInterval(function() {
        if (window.NRDCommon && window.NRDCommon.initializeAppAuth) {
          clearInterval(timer);
          window.NRDCommon.initializeAppAuth(cfg);
        } else if (Date.now() - start > 10000) {
          clearInterval(timer);
          if (window.NRDCommon && window.NRDCommon.showLoginFallback) {
            window.NRDCommon.showLoginFallback();
          } else {
            var ls = document.getElementById('login-screen');
            var rs = document.getElementById('redirecting-screen');
            if (rs) rs.classList.add('hidden');
            if (ls) ls.classList.remove('hidden');
          }
        }
      }, 100);
    })({ appName: 'NRD Control de Stock' });
  </script>

  <script type="module" src="app.js?v=1781980709252"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('service-worker.js?v=1781980709252').catch(function() {});
      });
    }
  </script>
</body>
</html>
